<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 16px;
      width: 260px;
      color: #202124;
    }
    label {
      display: block;
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 6px;
    }
    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    input[type="number"] {
      width: 64px;
      padding: 6px 8px;
      font-size: 14px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
    }
    input[type="number"]:focus {
      border-color: #1a73e8;
    }
    button {
      padding: 6px 16px;
      font-size: 14px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #1557b0; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #188038;
      min-height: 16px;
    }
    p {
      font-size: 12px;
      color: #5f6368;
      margin: 0 0 14px;
    }
  </style>
</head>
<body>
  <p>Google account index (0 = first account, 1 = second, ...)</p>
  <label for="authuser">Account index (authuser)</label>
  <div class="row">
    <input type="number" id="authuser" min="0" max="9" value="0">
    <button id="save">Save</button>
  </div>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
